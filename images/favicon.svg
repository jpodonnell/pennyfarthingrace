<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#1B2A4A"/>
  <!--
    Accurate penny farthing:
    Large front wheel left (cx=22, cy=34, r=18), small rear wheel right (cx=52, cy=46, r=8)
    Fork nearly vertical on front wheel. Backbone curves back to rear axle.
    Rider above front wheel with arms to handlebars.
  -->
  <!-- Speed lines -->
  <line x1="2" y1="29" x2="4"  y2="29" stroke="#B87333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2" y1="34" x2="4"  y2="34" stroke="#B87333" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="2" y1="39" x2="4"  y2="39" stroke="#B87333" stroke-width="1"   stroke-linecap="round"/>
  <!-- Large front wheel -->
  <circle cx="22" cy="34" r="18" stroke="#B87333" stroke-width="1.8" fill="none"/>
  <line x1="22" y1="16" x2="22" y2="52" stroke="#B87333" stroke-width="0.9" opacity="0.6"/>
  <line x1="4"  y1="34" x2="40" y2="34" stroke="#B87333" stroke-width="0.9" opacity="0.6"/>
  <line x1="9"  y1="21" x2="35" y2="47" stroke="#B87333" stroke-width="0.9" opacity="0.6"/>
  <line x1="35" y1="21" x2="9"  y2="47" stroke="#B87333" stroke-width="0.9" opacity="0.6"/>
  <circle cx="22" cy="34" r="2.5" fill="#B87333"/>
  <!-- Small rear wheel -->
  <circle cx="52" cy="46" r="8" stroke="#B87333" stroke-width="1.5" fill="none"/>
  <line x1="52" y1="38" x2="52" y2="54" stroke="#B87333" stroke-width="0.8" opacity="0.6"/>
  <line x1="44" y1="46" x2="60" y2="46" stroke="#B87333" stroke-width="0.8" opacity="0.6"/>
  <line x1="46" y1="40" x2="58" y2="52" stroke="#B87333" stroke-width="0.8" opacity="0.6"/>
  <line x1="58" y1="40" x2="46" y2="52" stroke="#B87333" stroke-width="0.8" opacity="0.6"/>
  <circle cx="52" cy="46" r="2" fill="#B87333"/>
  <!-- Fork: nearly vertical from fork crown to front axle -->
  <line x1="21" y1="16" x2="22" y2="34" stroke="#B87333" stroke-width="2" stroke-linecap="round"/>
  <!-- Backbone: curved from fork crown to rear axle -->
  <path d="M 21,16 C 32,24 44,38 52,46" stroke="#B87333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Seat post -->
  <line x1="26" y1="20" x2="25" y2="13" stroke="#B87333" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Saddle -->
  <path d="M 20,12 C 22,10 27,10 30,12" stroke="#B87333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Handlebar stem -->
  <line x1="21" y1="16" x2="20" y2="9"  stroke="#B87333" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Handlebars -->
  <path d="M 15,10 C 17,8 19,9 20,9 L 22,9 C 23,9 25,8 27,10" stroke="#B87333" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Rider head -->
  <circle cx="28" cy="9" r="4" stroke="#B87333" stroke-width="1.5" fill="none"/>
  <!-- Torso -->
  <line x1="28" y1="13" x2="26" y2="13" stroke="#B87333" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="28" y1="11" x2="20" y2="9"  stroke="#B87333" stroke-width="1.5" stroke-linecap="round"/>
</svg>
